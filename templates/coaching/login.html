{% extends 'coaching/base.html' %}
{% load static %}

{% block title %}St. Anthony Coaching Center - Sign In{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card" style="text-align: center;">
        <img src="{% static 'coaching/logo.png' %}" alt="St. Anthony Logo" style="height: 150px; width: 150px; object-fit: contain; border-radius: 20px; background-color: white; padding: 10px; margin: 0 auto 24px; display: block; border: 2px solid var(--border-color); box-shadow: 0 4px 16px rgba(0,0,0,0.15);">
        <h1 class="auth-title" style="font-size: 1.8rem; margin-bottom: 8px;">St. Anthony Coaching Center</h1>
        <p class="auth-subtitle" style="margin-bottom: 24px;">Sign in to manage your coaching portal</p>
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required autocomplete="username">
            </div>
            
            <div class="form-group" style="margin-bottom: 30px;">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-premium" style="width: 100%;">
                <i class="fa-solid fa-right-to-bracket" style="margin-right: 8px;"></i> Access System
            </button>
        </form>
    </div>
</div>
{% endblock %}
